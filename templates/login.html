{% extends "base.html" %}
{% block title %}Login — PlagiarismAI{% endblock %}
{% block content %}

<style>
/* ── Full Screen Reset ──────────────────────────────── */
html, body { margin: 0; padding: 0; overflow: hidden; background: #050510; }
.page-bg, .particles { display: none !important; }
.content-full { padding: 0 !important; justify-content: center; align-items: center; position: relative; }

/* ── Animated Shifting Background ───────────────────── */
.login-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d1025 25%, #120a20 50%, #0a1520 75%, #0a0a1a 100%);
    background-size: 400% 400%;
    animation: auroraShift 12s ease-in-out infinite;
}

@keyframes auroraShift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 0%; }
    50%  { background-position: 100% 100%; }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
}

/* Moving color blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    mix-blend-mode: screen;
    animation: blobMove 18s ease-in-out infinite;
}
.blob-1 { width:450px;height:450px;background:rgba(231,76,60,0.18);top:10%;left:15%;animation-duration:18s; }
.blob-2 { width:400px;height:400px;background:rgba(52,152,219,0.15);bottom:10%;right:10%;animation-delay:-6s;animation-duration:22s; }
.blob-3 { width:350px;height:350px;background:rgba(155,89,182,0.12);top:50%;left:55%;animation-delay:-12s;animation-duration:20s; }
.blob-4 { width:300px;height:300px;background:rgba(46,204,113,0.1);top:20%;right:25%;animation-delay:-4s;animation-duration:16s; }

@keyframes blobMove {
    0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    25% { transform: translate(80px, -60px) scale(1.15) rotate(5deg); }
    50% { transform: translate(-40px, 80px) scale(0.9) rotate(-3deg); }
    75% { transform: translate(50px, 30px) scale(1.1) rotate(2deg); }
}

/* Animated grid lines */
.login-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridDrift 25s linear infinite;
}
@keyframes gridDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(50px, 50px) rotate(1deg); }
}

/* Floating particles */
.particle-field { position: absolute; inset: 0; overflow: hidden; }
.p {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: particleRise linear infinite;
    box-shadow: 0 0 6px currentColor;
}
.p:nth-child(1)  { width:3px;height:3px;left:8%;color:#e74c3c;background:#e74c3c;animation-duration:7s;animation-delay:0s; }
.p:nth-child(2)  { width:2px;height:2px;left:18%;color:#3498db;background:#3498db;animation-duration:11s;animation-delay:0.8s; }
.p:nth-child(3)  { width:4px;height:4px;left:30%;color:#e74c3c;background:#e74c3c;animation-duration:9s;animation-delay:1.5s; }
.p:nth-child(4)  { width:2px;height:2px;left:42%;color:#9b59b6;background:#9b59b6;animation-duration:13s;animation-delay:0.3s; }
.p:nth-child(5)  { width:3px;height:3px;left:53%;color:#2ecc71;background:#2ecc71;animation-duration:8s;animation-delay:2.5s; }
.p:nth-child(6)  { width:2px;height:2px;left:63%;color:#e74c3c;background:#e74c3c;animation-duration:10s;animation-delay:1.2s; }
.p:nth-child(7)  { width:4px;height:4px;left:73%;color:#3498db;background:#3498db;animation-duration:12s;animation-delay:3.5s; }
.p:nth-child(8)  { width:2px;height:2px;left:83%;color:#9b59b6;background:#9b59b6;animation-duration:9s;animation-delay:2s; }
.p:nth-child(9)  { width:3px;height:3px;left:91%;color:#2ecc71;background:#2ecc71;animation-duration:7s;animation-delay:4s; }
.p:nth-child(10) { width:2px;height:2px;left:5%;color:#e74c3c;background:#e74c3c;animation-duration:14s;animation-delay:3s; }
.p:nth-child(11) { width:3px;height:3px;left:25%;color:#3498db;background:#3498db;animation-duration:10s;animation-delay:5s; }
.p:nth-child(12) { width:2px;height:2px;left:48%;color:#9b59b6;background:#9b59b6;animation-duration:8s;animation-delay:0.6s; }
.p:nth-child(13) { width:4px;height:4px;left:68%;color:#e74c3c;background:#e74c3c;animation-duration:11s;animation-delay:4s; }
.p:nth-child(14) { width:2px;height:2px;left:38%;color:#2ecc71;background:#2ecc71;animation-duration:13s;animation-delay:6s; }
.p:nth-child(15) { width:3px;height:3px;left:13%;color:#3498db;background:#3498db;animation-duration:9s;animation-delay:1.8s; }

@keyframes particleRise {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.9; }
    50%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* Glowing rings */
.ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(231,76,60,0.08);
    animation: ringPulse 6s ease-in-out infinite;
}
.ring-1 { width:500px;height:500px;top:50%;left:50%;margin:-250px 0 0 -250px; }
.ring-2 { width:700px;height:700px;top:50%;left:50%;margin:-350px 0 0 -350px;animation-delay:-2s;border-color:rgba(52,152,219,0.06); }
.ring-3 { width:900px;height:900px;top:50%;left:50%;margin:-450px 0 0 -450px;animation-delay:-4s;border-color:rgba(155,89,182,0.05); }

@keyframes ringPulse {
    0%, 100% { transform: scale(0.95); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 1; }
}

/* ── Login Card ─────────────────────────────────────── */
.login-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100vh;
    perspective: 1000px;
}

.login-card {
    position: relative;
    width: 100%;
    max-width: 420px;
    padding: 2.5rem;
    border-radius: 24px;
    background: rgba(12, 12, 30, 0.75);
    backdrop-filter: blur(30px) saturate(1.4);
    -webkit-backdrop-filter: blur(30px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    overflow: hidden;
}

/* Shimmer sweep across card */
.login-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    animation: shimmer 4s ease-in-out infinite;
    z-index: 0;
}

@keyframes shimmer {
    0%   { left: -100%; }
    100% { left: 200%; }
}

@keyframes cardEntrance {
    0%   { opacity: 0; transform: translateY(60px) rotateX(10deg) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); }
}

/* ── Header ─────────────────────────────────────────── */
.login-header { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }

.login-icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(231,76,60,0.2), rgba(231,76,60,0.05));
    border: 1px solid rgba(231,76,60,0.25);
    margin-bottom: 1.2rem;
    font-size: 1.6rem;
    animation: iconFloat 3s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(231,76,60,0.15);
}

@keyframes iconFloat {
    0%, 100% { transform: translateY(0); box-shadow: 0 0 30px rgba(231,76,60,0.15); }
    50% { transform: translateY(-8px); box-shadow: 0 10px 40px rgba(231,76,60,0.25); }
}

.login-title {
    font-size: 1.7rem;
    font-weight: 700;
    margin: 0 0 0.4rem 0;
    color: #fff;
    letter-spacing: -0.02em;
}

.login-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin: 0;
}

/* ── Form Elements ──────────────────────────────────── */
.login-form { position: relative; z-index: 1; }

.form-group {
    position: relative;
    margin-bottom: 1.2rem;
}

.form-group.stagger-1 { animation: staggerIn 0.6s 0.2s ease-out both; }
.form-group.stagger-2 { animation: staggerIn 0.6s 0.35s ease-out both; }
.login-options-wrap    { animation: staggerIn 0.6s 0.5s ease-out both; }
.login-btn-wrap        { animation: staggerIn 0.6s 0.65s ease-out both; }
.footer-link           { animation: staggerIn 0.6s 0.8s ease-out both; }

@keyframes staggerIn {
    0%   { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
}

.input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 1rem;
    transition: all 0.3s ease;
    pointer-events: none;
}

.login-input {
    width: 100%;
    padding: 0.95rem 1rem 0.95rem 2.8rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    color: #fff;
    font-size: 0.95rem;
    font-family: var(--font-body);
    transition: all 0.35s ease;
}

.login-input::placeholder { color: rgba(255,255,255,0.25); }

.login-input:focus {
    outline: none;
    border-color: var(--accent-red);
    background: rgba(231,76,60,0.04);
    box-shadow: 0 0 0 3px rgba(231,76,60,0.1), 0 0 20px rgba(231,76,60,0.08);
}

.login-input:focus ~ .input-icon { color: var(--accent-red); transform: translateY(-50%) scale(1.15); }

/* ── Options Row ────────────────────────────────────── */
.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
}
.login-checkbox { display: flex; align-items: center; gap: 0.4rem; color: var(--text-secondary); cursor: pointer; }
.login-forgot { color: rgba(231,76,60,0.8); text-decoration: none; transition: color 0.3s; }
.login-forgot:hover { color: #fff; }

/* ── Submit Button ──────────────────────────────────── */
.login-btn {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #e74c3c 100%);
    background-size: 200% 200%;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 4px 20px rgba(231,76,60,0.3);
    animation: gradientShift 3s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

.login-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
}
.login-btn:hover::after { opacity: 1; }

.login-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(231,76,60,0.4);
}

.login-btn:active {
    transform: translateY(0);
    box-shadow: 0 4px 15px rgba(231,76,60,0.3);
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* ── Footer Link ────────────────────────────────────── */
.footer-link {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    position: relative;
    z-index: 1;
}
.footer-link a { color: #fff; text-decoration: none; font-weight: 500; transition: color 0.3s; }
.footer-link a:hover { color: var(--accent-red); }

/* ── Decorative corner glows ────────────────────────── */
.corner-glow {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.4;
    z-index: 0;
    animation: cornerPulse 4s ease-in-out infinite;
}
.corner-glow.tl { top: -30px; left: -30px; background: rgba(231,76,60,0.3); }
.corner-glow.br { bottom: -30px; right: -30px; background: rgba(52,152,219,0.3); animation-delay: -2s; }

@keyframes cornerPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
}
</style>

<!-- Background -->
<div class="login-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="particle-field">
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
        <div class="p"></div><div class="p"></div><div class="p"></div>
    </div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
</div>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="login-card">
        <div class="corner-glow tl"></div>
        <div class="corner-glow br"></div>
        
        <div class="login-header">
            <div class="login-icon-wrap">🔒</div>
            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Sign in to your PlagiarismAI dashboard</p>
        </div>
        
        <form action="/login" method="POST" class="login-form">
            <div class="form-group stagger-1">
                <input type="email" name="email" class="login-input" placeholder="Email Address" required>
                <span class="input-icon">✉️</span>
            </div>
            
            <div class="form-group stagger-2">
                <input type="password" name="password" class="login-input" placeholder="Password" required>
                <span class="input-icon">🔑</span>
            </div>
            
            <div class="login-options login-options-wrap">
                <label class="login-checkbox">
                    <input type="checkbox" name="remember" checked> Remember me
                </label>
                <a href="#" class="login-forgot">Forgot Password?</a>
            </div>
            
            <div class="login-btn-wrap">
                <button type="submit" class="login-btn">Log In →</button>
            </div>
        </form>
        
        <div class="footer-link">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</div>

{% endblock %}
