{% extends "base.html" %}
{% block title %}Settings — PlagiarismAI{% endblock %}
{% block content %}
<div class="glass-card glass-card-lg">
    <h1 class="page-title">Settings</h1>
    <p class="page-subtitle">Manage your account preferences and application settings.</p>
    
    <div style="margin-top: 2rem;">
        <h3 class="section-title">Preferences</h3>
        <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <span>Dark Mode</span>
                <input type="checkbox" checked disabled>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <span>Email Notifications</span>
                <input type="checkbox" checked disabled>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>Auto-Save History</span>
                <input type="checkbox" checked disabled>
            </div>
        </div>
        
        <div class="flex-center mt-4">
            <button class="btn btn-primary">Save Changes</button>
        </div>
    </div>
</div>
{% endblock %}
